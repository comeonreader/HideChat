<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>今日幸运数字</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="app-bg">
  <div class="center-wrap">
    <div class="hero-card">
      <div class="hero-top">
        <span class="badge">Daily Mood</span>
        <span class="badge">Sunrise 06:18</span>
      </div>
      <h1 class="hero-title">把心安顿好，<br>好运自然会靠近。</h1>
      <p class="hero-sub">
        今天也值得被认真对待。慢一点、稳一点，给自己一份柔和的期待。
      </p>

      <form class="input-box" action="fortune.html" method="get">
        <input type="password" name="code" placeholder="请输入今日幸运数字" aria-label="请输入今日幸运数字" />
        <button class="btn btn-primary" type="submit">进入</button>
      </form>

      <div class="hero-footer">
        <span>今日关键词：放松、行动、耐心</span>
        <span>周四</span>
      </div>
    </div>
  </div>
</body>
</html>
