<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>今日运势</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="page fortune-page">
    <div class="topbar">
      <div>
        <div class="title">今日运势</div>
        <div class="muted">星期四 · 适合轻装上阵</div>
      </div>
      <span class="tag">好运指数 86%</span>
    </div>

    <div class="grid">
      <section class="card fortune-hero">
        <div class="section-title">整体走向</div>
        <div class="section-text">
          今天的节奏偏平稳，适合把注意力放在真正重要的人和事上。情绪容易受到细节影响，
          但只要稍微放慢速度，就能重新找回掌控感。
        </div>
        <div class="fortune-stats">
          <div class="stat">
            <div class="label">幸运色</div>
            <div class="value">青绿色</div>
          </div>
          <div class="stat">
            <div class="label">幸运数字</div>
            <div class="value" id="luckyNumberValue">--</div>
          </div>
          <div class="stat">
            <div class="label">宜做</div>
            <div class="value">沟通 / 整理</div>
          </div>
        </div>
      </section>

      <section class="card" style="padding:20px;">
        <div class="section-title">今日建议</div>
        <div class="advice-list">
          <div class="advice-item">
            <div class="icon-dot">1</div>
            <div>
              <div style="font-weight:600; margin-bottom:4px;">先处理最重要的事</div>
              <div class="section-text">把精力留给真正值得的人和对话，减少被噪音打断。</div>
            </div>
          </div>
          <div class="advice-item">
            <div class="icon-dot">2</div>
            <div>
              <div style="font-weight:600; margin-bottom:4px;">表达尽量简单清楚</div>
              <div class="section-text">今天适合坦率沟通，越简洁，越容易被理解。</div>
            </div>
          </div>
          <div class="advice-item">
            <div class="icon-dot">3</div>
            <div>
              <div style="font-weight:600; margin-bottom:4px;">别急着证明自己</div>
              <div class="section-text">稳住节奏，比着急解释更有效，也更容易带来好运。</div>
            </div>
          </div>
        </div>
      </section>

      <section class="card" style="padding:20px;">
        <div class="section-title">情绪提醒</div>
        <div class="section-text">
          今天容易在傍晚时分感到疲惫，适合早一点结束无效社交，给自己保留一些安静空间。
          如果有重要沟通，建议在午后进行，状态会更自然。
        </div>
      </section>
    </div>

    <div class="bottom-cta">
      <div class="cta-row">
        <a class="btn btn-brand" href="lucky-number.html" style="flex:1; text-align:center;">返回首页</a>
      </div>
    </div>
  </div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const luckyNumber = params.get("luckyNumber") || "13";
    document.getElementById("luckyNumberValue").textContent = luckyNumber;
  </script>
</body>
</html>
