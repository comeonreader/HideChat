<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>搜索 / 添加好友</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="page search-page">
    <div class="topbar">
      <div>
        <div class="title">搜索 / 添加好友</div>
        <div class="muted">支持昵称、用户 ID 搜索</div>
      </div>
      <a class="btn ghost" href="chat-list.html">返回聊天</a>
    </div>

    <div class="search-layout">
      <section class="card result-card">
        <div class="search-box" style="margin-bottom:16px;">
          <span>🔎</span>
          <input placeholder="输入昵称或用户 ID" />
          <button class="btn btn-brand">搜索</button>
        </div>

        <div class="section-title">搜索结果</div>

        <div class="user-row">
          <div class="avatar">林</div>
          <div class="user-meta">
            <div class="name">林夏</div>
            <div class="preview">ID: hide_1077</div>
          </div>
          <button class="btn btn-brand">添加</button>
        </div>

        <div class="user-row">
          <div class="avatar" style="background:linear-gradient(135deg,#f9a8d4,#a78bfa);">周</div>
          <div class="user-meta">
            <div class="name">周言</div>
            <div class="preview">ID: hide_2361</div>
          </div>
          <button class="btn ghost">已添加</button>
        </div>

        <div class="user-row">
          <div class="avatar" style="background:linear-gradient(135deg,#f59e0b,#ef4444);">唐</div>
          <div class="user-meta">
            <div class="name">唐果</div>
            <div class="preview">ID: hide_3204</div>
          </div>
          <button class="btn btn-brand">添加</button>
        </div>
      </section>

      <aside class="card result-card">
        <div class="section-title">最近添加</div>
        <div class="advice-list">
          <div class="advice-item">
            <div class="avatar small">M</div>
            <div>
              <div class="name">Mia</div>
              <div class="preview">今天 09:10 已添加</div>
            </div>
          </div>
          <div class="advice-item">
            <div class="avatar small" style="background:linear-gradient(135deg,#f472b6,#22c55e);">郑</div>
            <div>
              <div class="name">郑一</div>
              <div class="preview">昨天 21:34 已添加</div>
            </div>
          </div>
        </div>

        <div class="section-title" style="margin-top:18px;">提示</div>
        <div class="section-text">
          页面风格保持简洁，桌面端采用双栏布局，手机端自动折叠为单列，适合快速搜索和添加联系人。
        </div>
      </aside>
    </div>
  </div>
</body>
</html>
