spring:
  application:
    name: hidechat-backend
  profiles:
    active: dev
  jackson:
    default-property-inclusion: non_null
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/hidechat?currentSchema=hidechat
    username: hidechat
    password: hidechat
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    default-schema: hidechat
    schemas: hidechat

server:
  port: 8080
  servlet:
    context-path: /

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.hidechat.persistence.entity
  configuration:
    map-underscore-to-camel-case: true
    default-enum-type-handler: org.apache.ibatis.type.EnumTypeHandler

hidechat:
  security:
    jwt:
      issuer: hidechat
      secret: hidechat-dev-secret-key-hidechat-dev-secret-key-2026
      access-token-expire-seconds: 7200
      refresh-token-expire-seconds: 604800
  websocket:
    endpoint: /ws/chat
