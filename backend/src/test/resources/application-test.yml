spring:
  datasource:
    driver-class-name: org.postgresql.Driver
  data:
    redis:
      database: 0
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    default-schema: hidechat
    schemas: hidechat

logging:
  level:
    root: WARN

hidechat:
  mail:
    enabled: false
  file:
    storage-root: ./target/test-uploads
    url-signature-secret: test-file-secret
  security:
    web:
      allowed-origins:
        - http://localhost:5173
