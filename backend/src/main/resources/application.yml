spring:
  application:
    name: hidechat-backend
  profiles:
    active: dev
  jackson:
    default-property-inclusion: non_null
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/hidechat?currentSchema=hidechat
    username: hidechat
    password: hidechat
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    default-schema: hidechat
    schemas: hidechat
  mail:
    host: ${SPRING_MAIL_HOST:localhost}
    port: ${SPRING_MAIL_PORT:1025}
    username: ${SPRING_MAIL_USERNAME:}
    password: ${SPRING_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${SPRING_MAIL_SMTP_AUTH:false}
          starttls:
            enable: ${SPRING_MAIL_SMTP_STARTTLS:false}
          ssl:
            enable: ${SPRING_MAIL_SMTP_SSL_ENABLE:false}

server:
  address: ${SERVER_ADDRESS:0.0.0.0}
  port: 8080
  servlet:
    context-path: /

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.hidechat.persistence.entity
  configuration:
    map-underscore-to-camel-case: true
    default-enum-type-handler: org.apache.ibatis.type.EnumTypeHandler

hidechat:
  mail:
    enabled: ${HIDECHAT_MAIL_ENABLED:true}
    from-address: ${HIDECHAT_MAIL_FROM_ADDRESS:noreply@hidechat.local}
    from-name: ${HIDECHAT_MAIL_FROM_NAME:HideChat}
    require-auth: ${SPRING_MAIL_SMTP_AUTH:false}
    starttls-enabled: ${SPRING_MAIL_SMTP_STARTTLS:false}
    ssl-enabled: ${SPRING_MAIL_SMTP_SSL_ENABLE:false}
  file:
    storage-root: ${HIDECHAT_FILE_STORAGE_ROOT:./storage/uploads}
    max-file-size-bytes: ${HIDECHAT_FILE_MAX_SIZE_BYTES:10485760}
    signed-url-expire-seconds: ${HIDECHAT_FILE_SIGNED_URL_EXPIRE_SECONDS:2592000}
    url-signature-secret: ${HIDECHAT_FILE_URL_SIGNATURE_SECRET:hidechat-file-url-secret-change-me}
  security:
    jwt:
      issuer: hidechat
      secret: hidechat-dev-secret-key-hidechat-dev-secret-key-2026
      access-token-expire-seconds: 7200
      refresh-token-expire-seconds: 604800
    web:
      allowed-origins:
        - ${HIDECHAT_ALLOWED_ORIGIN:http://localhost:5173}
        - http://127.0.0.1:5173
      allowed-origin-patterns:
        - ${HIDECHAT_ALLOWED_ORIGIN_PATTERN:http://localhost:*}
        - http://127.0.0.1:*
        - http://192.168.*:*
        - http://10.*:*
        - http://172.16.*:*
        - http://172.17.*:*
        - http://172.18.*:*
        - http://172.19.*:*
        - http://172.20.*:*
        - http://172.21.*:*
        - http://172.22.*:*
        - http://172.23.*:*
        - http://172.24.*:*
        - http://172.25.*:*
        - http://172.26.*:*
        - http://172.27.*:*
        - http://172.28.*:*
        - http://172.29.*:*
        - http://172.30.*:*
        - http://172.31.*:*
      auth-requests-per-minute: ${HIDECHAT_AUTH_RPM:30}
      websocket-messages-per-minute: ${HIDECHAT_WS_RPM:120}
  websocket:
    endpoint: /ws/chat
