services:
  postgres:
    image: postgres:15-alpine
    container_name: hidechat-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hidechat_dev}
      POSTGRES_USER: ${POSTGRES_USER:-hidechat_dev}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hidechat_dev}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hidechat_dev} -d ${POSTGRES_DB:-hidechat_dev}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: hidechat-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: hidechat/backend:local
    container_name: hidechat-backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mailpit:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-hidechat_dev}?currentSchema=${POSTGRES_SCHEMA:-hidechat}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-hidechat_dev}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-hidechat_dev}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_DATABASE: 0
      HIDECHAT_SECURITY_JWT_SECRET: ${HIDECHAT_JWT_SECRET:-hidechat-dev-secret-key-hidechat-dev-secret-key-2026}
      HIDECHAT_ALLOWED_ORIGIN: ${HIDECHAT_ALLOWED_ORIGIN:-http://localhost:${FRONTEND_PORT:-5173}}
      HIDECHAT_MAIL_ENABLED: ${HIDECHAT_MAIL_ENABLED:-true}
      SPRING_MAIL_HOST: ${SPRING_MAIL_HOST:-mailpit}
      SPRING_MAIL_PORT: ${SPRING_MAIL_PORT:-1025}
      SPRING_MAIL_USERNAME: ${SPRING_MAIL_USERNAME:-}
      SPRING_MAIL_PASSWORD: ${SPRING_MAIL_PASSWORD:-}
      HIDECHAT_MAIL_FROM_ADDRESS: ${HIDECHAT_MAIL_FROM_ADDRESS:-noreply@hidechat.local}
      HIDECHAT_MAIL_FROM_NAME: ${HIDECHAT_MAIL_FROM_NAME:-HideChat}
      SPRING_MAIL_SMTP_AUTH: ${SPRING_MAIL_SMTP_AUTH:-false}
      SPRING_MAIL_SMTP_STARTTLS: ${SPRING_MAIL_SMTP_STARTTLS:-false}
      SPRING_MAIL_SMTP_SSL_ENABLE: ${SPRING_MAIL_SMTP_SSL_ENABLE:-false}
      HIDECHAT_FILE_STORAGE_ROOT: /app/storage/uploads
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    volumes:
      - backend_storage:/app/storage/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: hidechat/frontend:local
    container_name: hidechat-frontend
    depends_on:
      - backend
    expose:
      - "80"

  nginx:
    image: nginx:1.27-alpine
    container_name: hidechat-gateway
    depends_on:
      - frontend
      - backend
    environment:
      NGINX_LISTEN_PORT: 80
      NGINX_BACKEND_HOST: backend
      NGINX_BACKEND_PORT: 8080
      NGINX_FRONTEND_HOST: frontend
      NGINX_FRONTEND_PORT: 80
    ports:
    - "${GATEWAY_PORT:-80}:80"
    volumes:
      - ./docker/nginx/default.conf.template:/etc/nginx/templates/default.conf.template:ro

  mailpit:
    image: axllent/mailpit:latest
    container_name: hidechat-mailpit
    ports:
      - "${MAILPIT_SMTP_PORT:-1025}:1025"
      - "${MAILPIT_HTTP_PORT:-8025}:8025"
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1

volumes:
  postgres_data:
  redis_data:
  backend_storage:
