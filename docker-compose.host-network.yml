services:
  frontend:
    ports:
      - "${FRONTEND_PORT:-5173}:80"

  nginx:
    network_mode: "host"
    environment:
      NGINX_LISTEN_PORT: ${GATEWAY_PORT:-80}
      NGINX_BACKEND_HOST: 127.0.0.1
      NGINX_BACKEND_PORT: ${BACKEND_PORT:-8080}
      NGINX_FRONTEND_HOST: 127.0.0.1
      NGINX_FRONTEND_PORT: ${FRONTEND_PORT:-5173}
